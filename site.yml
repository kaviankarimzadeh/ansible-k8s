---
- name: Prepare all nodes
  hosts: k8s_cluster
  become: true
  roles:
    - role: common
      tags: common

- name: Configure HA load balancer on masters
  hosts: k8s_masters
  become: true
  roles:
    - role: ha
      tags: ha
      when: multi_master and lb_type == "haproxy"

- name: Deploy kubeadm configs
  hosts: k8s_cluster
  become: true
  tasks:
    - name: Deploy init config on first master
      ansible.builtin.import_tasks: roles/k8s/tasks/init-master.yml
      tags: k8s-config
      when: inventory_hostname == k8s_init_node

    - name: Deploy join config on additional masters
      ansible.builtin.import_tasks: roles/k8s/tasks/join-master.yml
      tags: k8s-config
      when:
        - multi_master
        - node_role == "master"
        - inventory_hostname != k8s_init_node

    - name: Deploy join config on workers
      ansible.builtin.import_tasks: roles/k8s/tasks/join-worker.yml
      tags: k8s-config
      when: node_role == "worker"
  tags: k8s-config
