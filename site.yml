---
- name: Prepare all nodes
  hosts: k8s_cluster
  become: true
  roles:
    - role: common
      tags: common

- name: Configure HA load balancer on masters
  hosts: k8s_masters
  become: true
  roles:
    - role: ha
      tags: ha
      when: multi_master and lb_type == "haproxy"

# ── Cluster bootstrap ──────────────────────────────────
- name: Initialize cluster on first master
  hosts: k8s_masters
  become: true
  tags: cluster-init
  tasks:
    - name: Initialize first control-plane node
      ansible.builtin.import_role:
        name: cluster
        tasks_from: init
      when: cluster_bootstrap and inventory_hostname == k8s_init_node

- name: Join additional control-plane nodes
  hosts: k8s_masters
  become: true
  serial: 1
  tags: cluster-join-master
  tasks:
    - name: Join master to cluster
      ansible.builtin.import_role:
        name: cluster
        tasks_from: join-master
      when:
        - cluster_bootstrap
        - multi_master
        - inventory_hostname != k8s_init_node

- name: Join worker nodes
  hosts: k8s_workers
  become: true
  tags: cluster-join-worker
  tasks:
    - name: Join worker to cluster
      ansible.builtin.import_role:
        name: cluster
        tasks_from: join-worker
      when: cluster_bootstrap
