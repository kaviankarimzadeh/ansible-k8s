---
# ── Check if containerd is already installed and healthy ──

- name: Check if containerd is active
  ansible.builtin.command: systemctl is-active containerd
  register: containerd_status
  changed_when: false
  failed_when: false

- name: Get installed containerd version
  ansible.builtin.command: containerd --version
  register: containerd_installed_version
  changed_when: false
  failed_when: false

- name: Set containerd needs install fact
  ansible.builtin.set_fact:
    containerd_needs_install: >-
      {{ containerd_status.rc != 0 or
         containerd_version not in (containerd_installed_version.stdout | default('')) }}

# ── Add Docker repo (containerd.io source) ───────

- name: Create apt keyrings directory (Debian/Ubuntu)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when:
    - ansible_facts['os_family'] == "Debian"
    - containerd_needs_install

- name: Add Docker GPG key (Debian/Ubuntu)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when:
    - ansible_facts['os_family'] == "Debian"
    - containerd_needs_install

- name: Add Docker repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present
  when:
    - ansible_facts['os_family'] == "Debian"
    - containerd_needs_install

- name: Add Docker repository (RedHat/CentOS)
  ansible.builtin.yum_repository:
    name: docker-ce
    description: Docker CE Stable
    baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
    gpgcheck: true
    gpgkey: https://download.docker.com/linux/centos/gpg
    enabled: true
  when:
    - ansible_facts['os_family'] == "RedHat"
    - containerd_needs_install

# ── Install containerd ────────────────────────────

- name: Install containerd.io (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "containerd.io={{ containerd_version }}-*"
    state: present
    update_cache: true
    allow_downgrade: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - containerd_needs_install

- name: Install containerd.io (RedHat/CentOS)
  ansible.builtin.dnf:
    name: "containerd.io-{{ containerd_version }}"
    state: present
    update_cache: true
  when:
    - ansible_facts['os_family'] == "RedHat"
    - containerd_needs_install

# ── Configure containerd ─────────────────────────

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate clean default containerd config
  ansible.builtin.shell: containerd config default > /tmp/containerd-default.toml
  changed_when: false

- name: Enable systemd cgroup driver in generated config
  ansible.builtin.replace:
    path: /tmp/containerd-default.toml
    regexp: 'SystemdCgroup\s*=\s*false'
    replace: 'SystemdCgroup = true'
  changed_when: false

- name: Remove any disabled_plugins containing cri
  ansible.builtin.lineinfile:
    path: /tmp/containerd-default.toml
    regexp: '^disabled_plugins\s*=.*"cri"'
    line: 'disabled_plugins = []'
  changed_when: false

# - name: Set sandbox image to private registry
#   ansible.builtin.replace:
#     path: /tmp/containerd-default.toml
#     regexp: 'registry\.k8s\.io/pause'
#     replace: '{{ image_repository }}/pause'
#   changed_when: false
#   when: image_repository is defined

- name: Deploy containerd config
  ansible.builtin.copy:
    src: /tmp/containerd-default.toml
    dest: /etc/containerd/config.toml
    remote_src: true
    mode: "0644"
  register: containerd_config_deployed

- name: Clean up temp config
  ansible.builtin.file:
    path: /tmp/containerd-default.toml
    state: absent
  changed_when: false

# ── Enable and start containerd ──────────────────

- name: Restart containerd after config change
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: true
    daemon_reload: true
  when: containerd_config_deployed.changed

- name: Ensure containerd is running
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
