---
# ── Pre-flight: skip if this node already joined ────────
- name: Check if node already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Deploy kubeadm join config for worker
  ansible.builtin.template:
    src: roles/k8s/templates/kubeadm-join-worker.yml.j2
    dest: /etc/kubernetes/kubeadm-join.yml
    mode: "0600"
  vars:
    kubeadm_token: "{{ hostvars[k8s_init_node]['kubeadm_token'] }}"
    kubeadm_ca_cert_hash: "{{ hostvars[k8s_init_node]['kubeadm_ca_cert_hash'] }}"
  when: not kubelet_conf.stat.exists

- name: Join cluster as worker node
  ansible.builtin.command: >-
    kubeadm join --config /etc/kubernetes/kubeadm-join.yml
  register: join_worker_output
  when: not kubelet_conf.stat.exists
  changed_when: true
